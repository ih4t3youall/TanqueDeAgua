<svg viewBox="0 0 920 540" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="920" height="540" fill="#f8fafc"/>
  <text x="460" y="38" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">Diagrama general del sistema</text>
  <text x="460" y="62" text-anchor="middle" font-size="14" fill="#64748b">Medidor de nivel de tanque + control de bomba</text>

  <!-- TANQUE -->
  <g>
    <rect x="40" y="110" width="300" height="220" rx="14" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="190" y="138" text-anchor="middle" font-size="17" font-weight="700" fill="#075985">NODO TANQUE (maestro)</text>

    <!-- tanque dibujo -->
    <rect x="70" y="160" width="80" height="130" rx="6" fill="#fff" stroke="#0369a1" stroke-width="2"/>
    <rect x="72" y="225" width="76" height="63" rx="4" fill="#38bdf8"/>
    <line x1="60" y1="160" x2="160" y2="160" stroke="#475569" stroke-width="3"/>
    <circle cx="110" cy="168" r="6" fill="#1e293b"/>
    <text x="110" y="310" text-anchor="middle" font-size="11" fill="#475569">sensor en la tapa</text>

    <rect x="180" y="170" width="140" height="44" rx="6" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
    <text x="250" y="190" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">ESP32</text>
    <text x="250" y="205" text-anchor="middle" font-size="10" fill="#92400e">sensor + WiFi + radio</text>

    <rect x="180" y="226" width="140" height="30" rx="6" fill="#fff" stroke="#0284c7" stroke-width="1.5"/>
    <text x="250" y="245" text-anchor="middle" font-size="11" fill="#075985">JSN-SR04T (ultrasónico)</text>

    <rect x="180" y="266" width="140" height="30" rx="6" fill="#fff" stroke="#0284c7" stroke-width="1.5"/>
    <text x="250" y="285" text-anchor="middle" font-size="11" fill="#075985">NRF24L01 PA/LNA</text>
  </g>

  <!-- BOMBA -->
  <g>
    <rect x="580" y="110" width="300" height="220" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="730" y="138" text-anchor="middle" font-size="17" font-weight="700" fill="#166534">NODO BOMBA (esclavo)</text>

    <rect x="610" y="170" width="140" height="44" rx="6" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
    <text x="680" y="190" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Arduino Nano</text>
    <text x="680" y="205" text-anchor="middle" font-size="10" fill="#92400e">solo obedece</text>

    <rect x="610" y="226" width="140" height="30" rx="6" fill="#fff" stroke="#16a34a" stroke-width="1.5"/>
    <text x="680" y="245" text-anchor="middle" font-size="11" fill="#166534">NRF24L01 PA/LNA</text>

    <rect x="610" y="266" width="140" height="30" rx="6" fill="#fff" stroke="#16a34a" stroke-width="1.5"/>
    <text x="680" y="285" text-anchor="middle" font-size="11" fill="#166534">2 relés → botonera</text>

    <!-- bomba -->
    <circle cx="810" cy="250" r="34" fill="#fff" stroke="#166534" stroke-width="2"/>
    <text x="810" y="248" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">BOMBA</text>
    <text x="810" y="262" text-anchor="middle" font-size="10" fill="#166534">contactor</text>
  </g>

  <!-- radio link -->
  <line x1="340" y1="281" x2="610" y2="281" stroke="#7c3aed" stroke-width="3" stroke-dasharray="8 5"/>
  <polygon points="610,281 598,275 598,287" fill="#7c3aed"/>
  <rect x="395" y="258" width="160" height="24" rx="12" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="475" y="274" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">RADIO 2.4 GHz (~20 m)</text>
  <text x="475" y="248" text-anchor="middle" font-size="11" fill="#5b21b6">"encender / apagar"</text>

  <!-- servidor -->
  <g>
    <rect x="310" y="400" width="300" height="100" rx="14" fill="#f1f5f9" stroke="#334155" stroke-width="2"/>
    <text x="460" y="428" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">SERVIDOR (Python / Flask)</text>
    <text x="460" y="452" text-anchor="middle" font-size="12" fill="#475569">página web: ver nivel y controlar</text>
    <text x="460" y="472" text-anchor="middle" font-size="12" fill="#475569">(modo AUTO/MANUAL, umbrales)</text>
    <text x="460" y="490" text-anchor="middle" font-size="11" fill="#94a3b8">opcional: el sistema funciona sin él</text>
  </g>

  <!-- wifi link -->
  <line x1="250" y1="330" x2="360" y2="400" stroke="#0891b2" stroke-width="3" stroke-dasharray="6 4"/>
  <text x="250" y="375" text-anchor="middle" font-size="12" font-weight="600" fill="#0e7490" transform="rotate(33 285 372)">WiFi (HTTP)</text>

  <!-- celular -->
  <rect x="690" y="410" width="44" height="78" rx="8" fill="#fff" stroke="#334155" stroke-width="2"/>
  <rect x="696" y="420" width="32" height="52" fill="#bae6fd"/>
  <text x="760" y="445" font-size="12" fill="#475569">celular / PC</text>
  <text x="760" y="462" font-size="12" fill="#475569">en tu red</text>
  <line x1="610" y1="455" x2="690" y2="450" stroke="#334155" stroke-width="2" stroke-dasharray="5 4"/>
</svg>
