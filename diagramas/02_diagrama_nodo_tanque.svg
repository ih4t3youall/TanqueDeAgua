<svg viewBox="0 0 980 720" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="980" height="720" fill="#f8fafc"/>
  <text x="490" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Nodo TANQUE — cableado (ESP32)</text>
  <text x="490" y="58" text-anchor="middle" font-size="13" fill="#64748b">Sensor ultrasónico JSN-SR04T + radio NRF24L01</text>

  <!-- ===================== ESP32 ===================== -->
  <rect x="410" y="120" width="170" height="380" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="495" y="148" text-anchor="middle" font-size="16" font-weight="700" fill="#92400e">ESP32</text>
  <text x="495" y="166" text-anchor="middle" font-size="11" fill="#b45309">DevKit v1</text>

  <!-- pines izq (al sensor) -->
  <g font-size="11" fill="#1e293b" text-anchor="start">
    <circle cx="410" cy="200" r="4" fill="#dc2626"/><text x="416" y="204">5V (VIN)</text>
    <circle cx="410" cy="235" r="4" fill="#111827"/><text x="416" y="239">GND</text>
    <circle cx="410" cy="270" r="4" fill="#ea580c"/><text x="416" y="274">GPIO26 (TRIG)</text>
    <circle cx="410" cy="320" r="4" fill="#2563eb"/><text x="416" y="324">GPIO25 (ECHO)</text>
  </g>
  <!-- pines der (a la radio) -->
  <g font-size="11" fill="#1e293b" text-anchor="end">
    <circle cx="580" cy="200" r="4" fill="#dc2626"/><text x="574" y="204">3V3</text>
    <circle cx="580" cy="230" r="4" fill="#111827"/><text x="574" y="234">GND</text>
    <circle cx="580" cy="260" r="4" fill="#16a34a"/><text x="574" y="264">GPIO4 (CE)</text>
    <circle cx="580" cy="290" r="4" fill="#9333ea"/><text x="574" y="294">GPIO5 (CSN)</text>
    <circle cx="580" cy="320" r="4" fill="#0891b2"/><text x="574" y="324">GPIO18 (SCK)</text>
    <circle cx="580" cy="350" r="4" fill="#ca8a04"/><text x="574" y="354">GPIO23 (MOSI)</text>
    <circle cx="580" cy="380" r="4" fill="#db2777"/><text x="574" y="384">GPIO19 (MISO)</text>
  </g>

  <!-- ===================== SENSOR ===================== -->
  <rect x="60" y="180" width="150" height="170" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="135" y="206" text-anchor="middle" font-size="14" font-weight="700" fill="#075985">JSN-SR04T</text>
  <text x="135" y="222" text-anchor="middle" font-size="10" fill="#0369a1">(waterproof)</text>
  <g font-size="11" fill="#1e293b" text-anchor="start">
    <circle cx="210" cy="250" r="4" fill="#dc2626"/><text x="150" y="254" text-anchor="end">VCC (5V)</text>
    <circle cx="210" cy="280" r="4" fill="#111827"/><text x="150" y="284" text-anchor="end">GND</text>
    <circle cx="210" cy="310" r="4" fill="#ea580c"/><text x="150" y="314" text-anchor="end">TRIG</text>
    <circle cx="210" cy="340" r="4" fill="#2563eb"/><text x="150" y="344" text-anchor="end">ECHO</text>
  </g>

  <!-- wires sensor -> esp32 -->
  <path d="M210,250 L300,250 L300,200 L410,200" fill="none" stroke="#dc2626" stroke-width="2.5"/>
  <path d="M210,280 L320,280 L320,235 L410,235" fill="none" stroke="#111827" stroke-width="2.5"/>
  <path d="M210,310 L340,310 L340,270 L410,270" fill="none" stroke="#ea580c" stroke-width="2.5"/>
  <!-- ECHO pasa por el divisor -->
  <path d="M210,340 L250,340" fill="none" stroke="#2563eb" stroke-width="2.5"/>
  <path d="M330,420 L360,420 L360,320 L410,320" fill="none" stroke="#2563eb" stroke-width="2.5"/>

  <!-- ===================== DIVISOR ===================== -->
  <rect x="230" y="380" width="120" height="120" rx="8" fill="#fff" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="290" y="400" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">Divisor 5V→3.3V</text>
  <text x="290" y="415" text-anchor="middle" font-size="9" fill="#1d4ed8">(en el pin ECHO)</text>
  <!-- ECHO in -->
  <line x1="250" y1="340" x2="250" y2="440" stroke="#2563eb" stroke-width="2.5"/>
  <text x="244" y="356" text-anchor="end" font-size="9" fill="#1d4ed8">ECHO</text>
  <!-- R1 1k -->
  <rect x="240" y="440" width="40" height="14" fill="#fcd34d" stroke="#92400e"/>
  <text x="295" y="451" font-size="9" fill="#92400e">1 kΩ</text>
  <!-- nodo a GPIO25 -->
  <circle cx="330" cy="447" r="3" fill="#2563eb"/>
  <line x1="280" y1="447" x2="330" y2="447" stroke="#2563eb" stroke-width="2.5"/>
  <text x="330" y="438" text-anchor="middle" font-size="8" fill="#1d4ed8">→ GPIO25</text>
  <!-- R2 2k a GND -->
  <rect x="323" y="460" width="14" height="34" fill="#fcd34d" stroke="#92400e"/>
  <line x1="330" y1="447" x2="330" y2="460" stroke="#2563eb" stroke-width="2.5"/>
  <line x1="330" y1="494" x2="330" y2="500" stroke="#111827" stroke-width="2.5"/>
  <text x="345" y="480" font-size="9" fill="#92400e">2 kΩ</text>
  <text x="330" y="514" text-anchor="middle" font-size="9" fill="#111827">GND</text>

  <!-- ===================== NRF24 ===================== -->
  <rect x="770" y="170" width="160" height="250" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="850" y="196" text-anchor="middle" font-size="14" font-weight="700" fill="#5b21b6">NRF24L01+</text>
  <text x="850" y="212" text-anchor="middle" font-size="10" fill="#6d28d9">PA/LNA (con base 3.3V)</text>
  <g font-size="11" fill="#1e293b" text-anchor="start">
    <circle cx="770" cy="240" r="4" fill="#dc2626"/><text x="778" y="244">VCC</text>
    <circle cx="770" cy="266" r="4" fill="#111827"/><text x="778" y="270">GND</text>
    <circle cx="770" cy="292" r="4" fill="#16a34a"/><text x="778" y="296">CE</text>
    <circle cx="770" cy="318" r="4" fill="#9333ea"/><text x="778" y="322">CSN</text>
    <circle cx="770" cy="344" r="4" fill="#0891b2"/><text x="778" y="348">SCK</text>
    <circle cx="770" cy="370" r="4" fill="#ca8a04"/><text x="778" y="374">MOSI</text>
    <circle cx="770" cy="396" r="4" fill="#db2777"/><text x="778" y="400">MISO</text>
  </g>

  <!-- wires esp32 -> nrf24 -->
  <path d="M580,200 L660,200 L660,240 L770,240" fill="none" stroke="#dc2626" stroke-width="2.5"/>
  <path d="M580,230 L650,230 L650,266 L770,266" fill="none" stroke="#111827" stroke-width="2.5"/>
  <path d="M580,260 L640,260 L640,292 L770,292" fill="none" stroke="#16a34a" stroke-width="2.5"/>
  <path d="M580,290 L630,290 L630,318 L770,318" fill="none" stroke="#9333ea" stroke-width="2.5"/>
  <path d="M580,320 L700,320 L700,344 L770,344" fill="none" stroke="#0891b2" stroke-width="2.5"/>
  <path d="M580,350 L690,350 L690,370 L770,370" fill="none" stroke="#ca8a04" stroke-width="2.5"/>
  <path d="M580,380 L680,380 L680,396 L770,396" fill="none" stroke="#db2777" stroke-width="2.5"/>

  <!-- ===================== TABLA / NOTAS ===================== -->
  <rect x="60" y="560" width="870" height="130" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="80" y="585" font-size="14" font-weight="700" fill="#0f172a">Conexiones</text>
  <g font-size="12" fill="#334155">
    <text x="80" y="610">SENSOR:  VCC→5V · GND→GND · TRIG→GPIO26 · ECHO→(divisor 1k/2k)→GPIO25</text>
    <text x="80" y="632">RADIO:   VCC→3V3 · GND→GND · CE→GPIO4 · CSN→GPIO5 · SCK→GPIO18 · MOSI→GPIO23 · MISO→GPIO19</text>
  </g>
  <text x="80" y="660" font-size="12" fill="#b91c1c" font-weight="600">⚠ El ECHO sale a 5V: SIEMPRE va con el divisor (1kΩ en serie + 2kΩ a GND) para no dañar el ESP32.</text>
  <text x="80" y="680" font-size="12" fill="#7c3aed" font-weight="600">★ Usá la base con regulador 3.3V para el NRF24 (o capacitor 10–100µF en VCC-GND): evita fallas.</text>

  <!-- leyenda colores -->
  <g font-size="10" fill="#475569">
    <rect x="700" y="120" width="230" height="40" rx="6" fill="#fff" stroke="#e2e8f0"/>
    <circle cx="715" cy="134" r="4" fill="#dc2626"/><text x="724" y="138">alimentación</text>
    <circle cx="800" cy="134" r="4" fill="#111827"/><text x="809" y="138">GND</text>
    <circle cx="715" cy="150" r="4" fill="#0891b2"/><text x="724" y="154">señales</text>
  </g>
</svg>
