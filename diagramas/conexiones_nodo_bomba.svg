<svg viewBox="0 0 960 700" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title>Diagrama de conexiones del nodo bomba (esclavo)</title>
  <rect x="0" y="0" width="960" height="700" fill="#ffffff"/>

  <text x="30" y="34" font-size="22" font-weight="700" fill="#2C2C2A">Nodo Bomba (esclavo) — conexiones</text>
  <text x="30" y="56" font-size="13" fill="#5F5E5A">Arduino Nano · nRF24L01+PA+LNA · AMS1117 5V→3.3V · módulo relé</text>

  <!-- ARDUINO NANO -->
  <rect x="60" y="120" width="180" height="400" rx="10" fill="#fff" stroke="#888780" stroke-width="2"/>
  <rect x="60" y="120" width="180" height="34" rx="10" fill="#1D9E75"/>
  <text x="150" y="143" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">ARDUINO NANO</text>
  <text x="150" y="505" font-size="11" fill="#5F5E5A" text-anchor="middle">(USB = alimentación)</text>

  <line x1="226" y1="185" x2="240" y2="185" stroke="#888780" stroke-width="2"/>
  <text x="220" y="189" font-size="12" fill="#2C2C2A" text-anchor="end">D9 · CE</text>
  <line x1="226" y1="221" x2="240" y2="221" stroke="#888780" stroke-width="2"/>
  <text x="220" y="225" font-size="12" fill="#2C2C2A" text-anchor="end">D10 · CSN</text>
  <line x1="226" y1="257" x2="240" y2="257" stroke="#888780" stroke-width="2"/>
  <text x="220" y="261" font-size="12" fill="#2C2C2A" text-anchor="end">D13 · SCK</text>
  <line x1="226" y1="293" x2="240" y2="293" stroke="#888780" stroke-width="2"/>
  <text x="220" y="297" font-size="12" fill="#2C2C2A" text-anchor="end">D11 · MOSI</text>
  <line x1="226" y1="329" x2="240" y2="329" stroke="#888780" stroke-width="2"/>
  <text x="220" y="333" font-size="12" fill="#2C2C2A" text-anchor="end">D12 · MISO</text>
  <line x1="226" y1="370" x2="240" y2="370" stroke="#E24B4A" stroke-width="3"/>
  <text x="220" y="374" font-size="12" font-weight="700" fill="#E24B4A" text-anchor="end">5V</text>
  <line x1="226" y1="406" x2="240" y2="406" stroke="#2C2C2A" stroke-width="3"/>
  <text x="220" y="410" font-size="12" font-weight="700" fill="#2C2C2A" text-anchor="end">GND</text>
  <line x1="226" y1="446" x2="240" y2="446" stroke="#BA7517" stroke-width="2"/>
  <text x="220" y="450" font-size="12" fill="#2C2C2A" text-anchor="end">D3</text>
  <line x1="226" y1="482" x2="240" y2="482" stroke="#888780" stroke-width="2" stroke-dasharray="3 3"/>
  <text x="220" y="486" font-size="12" fill="#5F5E5A" text-anchor="end">D4 (LED)</text>

  <!-- nRF24 -->
  <rect x="610" y="120" width="210" height="220" rx="10" fill="#fff" stroke="#888780" stroke-width="2"/>
  <rect x="610" y="120" width="210" height="32" rx="10" fill="#7F77DD"/>
  <text x="715" y="142" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">nRF24L01 (radio)</text>
  <text x="613" y="167" font-size="11" fill="#5F5E5A">antena ▲</text>
  <line x1="610" y1="185" x2="596" y2="185" stroke="#97C459" stroke-width="2"/>
  <text x="624" y="189" font-size="12" fill="#2C2C2A">CE</text>
  <line x1="610" y1="213" x2="596" y2="213" stroke="#378ADD" stroke-width="2"/>
  <text x="624" y="217" font-size="12" fill="#2C2C2A">CSN</text>
  <line x1="610" y1="241" x2="596" y2="241" stroke="#7F77DD" stroke-width="2"/>
  <text x="624" y="245" font-size="12" fill="#2C2C2A">SCK</text>
  <line x1="610" y1="269" x2="596" y2="269" stroke="#D4537E" stroke-width="2"/>
  <text x="624" y="273" font-size="12" fill="#2C2C2A">MOSI</text>
  <line x1="610" y1="297" x2="596" y2="297" stroke="#1D9E75" stroke-width="2"/>
  <text x="624" y="301" font-size="12" fill="#2C2C2A">MISO</text>
  <line x1="610" y1="313" x2="596" y2="313" stroke="#EF9F27" stroke-width="3"/>
  <text x="624" y="316" font-size="11" font-weight="700" fill="#BA7517">VCC (3.3V)</text>
  <text x="715" y="334" font-size="11" fill="#5F5E5A" text-anchor="middle">GND · IRQ (libre)</text>

  <!-- AMS1117 -->
  <rect x="370" y="360" width="150" height="70" rx="8" fill="#fff" stroke="#EF9F27" stroke-width="2"/>
  <text x="445" y="382" font-size="13" font-weight="700" fill="#2C2C2A" text-anchor="middle">AMS1117</text>
  <text x="445" y="399" font-size="10" fill="#5F5E5A" text-anchor="middle">5V → 3.3V</text>
  <text x="378" y="420" font-size="10" fill="#E24B4A">IN</text>
  <text x="445" y="425" font-size="10" fill="#5F5E5A" text-anchor="middle">GND</text>
  <text x="512" y="375" font-size="10" fill="#BA7517" text-anchor="end">OUT</text>

  <!-- RELE -->
  <rect x="610" y="430" width="210" height="170" rx="10" fill="#fff" stroke="#888780" stroke-width="2"/>
  <rect x="610" y="430" width="210" height="32" rx="10" fill="#378ADD"/>
  <text x="715" y="452" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">MÓDULO RELÉ</text>
  <line x1="610" y1="485" x2="596" y2="485" stroke="#BA7517" stroke-width="2"/>
  <text x="624" y="489" font-size="12" fill="#2C2C2A">IN</text>
  <line x1="610" y1="515" x2="596" y2="515" stroke="#E24B4A" stroke-width="3"/>
  <text x="624" y="519" font-size="12" font-weight="700" fill="#E24B4A">VCC (5V)</text>
  <line x1="610" y1="545" x2="596" y2="545" stroke="#2C2C2A" stroke-width="3"/>
  <text x="624" y="549" font-size="12" font-weight="700" fill="#2C2C2A">GND</text>
  <line x1="820" y1="500" x2="834" y2="500" stroke="#993C1D" stroke-width="3"/>
  <text x="816" y="504" font-size="12" font-weight="700" fill="#993C1D" text-anchor="end">COM</text>
  <line x1="820" y1="535" x2="834" y2="535" stroke="#993C1D" stroke-width="3"/>
  <text x="816" y="539" font-size="12" font-weight="700" fill="#993C1D" text-anchor="end">NC</text>

  <!-- contactor -->
  <rect x="834" y="470" width="110" height="100" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="2"/>
  <text x="889" y="500" font-size="11" font-weight="700" fill="#993C1D" text-anchor="middle">Línea ON</text>
  <text x="889" y="516" font-size="11" font-weight="700" fill="#993C1D" text-anchor="middle">de la bomba</text>
  <text x="889" y="540" font-size="9" fill="#993C1D" text-anchor="middle">(contactor /</text>
  <text x="889" y="552" font-size="9" fill="#993C1D" text-anchor="middle">botonera)</text>

  <!-- CABLES SPI -->
  <path d="M240,185 L610,185" fill="none" stroke="#97C459" stroke-width="2"/>
  <path d="M240,221 L610,213" fill="none" stroke="#378ADD" stroke-width="2"/>
  <path d="M240,257 L610,241" fill="none" stroke="#7F77DD" stroke-width="2"/>
  <path d="M240,293 L610,269" fill="none" stroke="#D4537E" stroke-width="2"/>
  <path d="M240,329 L610,297" fill="none" stroke="#1D9E75" stroke-width="2"/>

  <!-- 5V -->
  <path d="M240,370 L360,370 L370,400" fill="none" stroke="#E24B4A" stroke-width="3"/>
  <path d="M335,370 L335,515 L610,515" fill="none" stroke="#E24B4A" stroke-width="3"/>
  <circle cx="335" cy="370" r="3.5" fill="#E24B4A"/>

  <!-- 3.3V -->
  <path d="M520,372 L560,372 L560,313 L610,313" fill="none" stroke="#EF9F27" stroke-width="3"/>

  <!-- GND -->
  <path d="M240,406 L300,406" fill="none" stroke="#2C2C2A" stroke-width="3"/>
  <path d="M300,300 L300,545" fill="none" stroke="#2C2C2A" stroke-width="3"/>
  <path d="M300,300 L596,300 L596,313 L610,313" fill="none" stroke="#2C2C2A" stroke-width="2"/>
  <path d="M300,418 L370,418" fill="none" stroke="#2C2C2A" stroke-width="2"/>
  <path d="M300,545 L610,545" fill="none" stroke="#2C2C2A" stroke-width="3"/>
  <circle cx="300" cy="406" r="3.5" fill="#2C2C2A"/>
  <circle cx="300" cy="418" r="3" fill="#2C2C2A"/>
  <circle cx="300" cy="545" r="3.5" fill="#2C2C2A"/>

  <!-- D3 -->
  <path d="M240,446 L320,446 L320,485 L610,485" fill="none" stroke="#BA7517" stroke-width="2"/>

  <!-- contactos -->
  <path d="M820,485 L827,485 L827,500 L834,500" fill="none" stroke="#993C1D" stroke-width="3"/>
  <path d="M820,560 L827,560 L827,535 L834,535" fill="none" stroke="#993C1D" stroke-width="3"/>

  <!-- aviso -->
  <rect x="610" y="610" width="334" height="58" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="1.5"/>
  <text x="624" y="630" font-size="11.5" font-weight="700" fill="#993C1D">⚠ Lado COM/NC = circuito del contactor</text>
  <text x="624" y="646" font-size="10.5" fill="#993C1D">NO es la electricidad del Arduino. El relé los aísla.</text>
  <text x="624" y="660" font-size="10.5" fill="#993C1D">Relé reposo = bomba ON · relé activado = corta.</text>

  <!-- LEYENDA -->
  <text x="60" y="560" font-size="12" font-weight="700" fill="#2C2C2A">Referencia de cables</text>
  <line x1="60" y1="578" x2="84" y2="578" stroke="#E24B4A" stroke-width="3"/><text x="90" y="582" font-size="11" fill="#5F5E5A">5V (rojo)</text>
  <line x1="60" y1="598" x2="84" y2="598" stroke="#2C2C2A" stroke-width="3"/><text x="90" y="602" font-size="11" fill="#5F5E5A">GND (negro)</text>
  <line x1="60" y1="618" x2="84" y2="618" stroke="#EF9F27" stroke-width="3"/><text x="90" y="622" font-size="11" fill="#5F5E5A">3.3V (naranja)</text>
  <line x1="60" y1="638" x2="84" y2="638" stroke="#7F77DD" stroke-width="3"/><text x="90" y="642" font-size="11" fill="#5F5E5A">SPI radio (varios colores)</text>
  <line x1="60" y1="658" x2="84" y2="658" stroke="#BA7517" stroke-width="3"/><text x="90" y="662" font-size="11" fill="#5F5E5A">D3 → relé IN</text>
  <line x1="240" y1="578" x2="264" y2="578" stroke="#993C1D" stroke-width="3"/><text x="270" y="582" font-size="11" fill="#5F5E5A">contactos relé (contactor)</text>
</svg>
