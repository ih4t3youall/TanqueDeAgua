  <text x="770" y="686" font-size="10.5" fill="#854F0B">- 180Ω: del nodo a GND</text>
  <text x="770" y="702" font-size="10.5" fill="#854F0B">- El nodo (medio) va a G25</text>
  <text x="770" y="722" font-size="10.5" font-weight="700" fill="#854F0B">Resultado: ~3.2V</text>

  <text x="60" y="618" font-size="12" font-weight="700" fill="#2C2C2A">Cables</text>
  <g font-size="11" fill="#5F5E5A">
    <line x1="60" y1="636" x2="84" y2="636" stroke="#E24B4A" stroke-width="3"/><text x="90" y="640">5V</text>
    <line x1="150" y1="636" x2="174" y2="636" stroke="#2C2C2A" stroke-width="3"/><text x="180" y="640">GND</text>
