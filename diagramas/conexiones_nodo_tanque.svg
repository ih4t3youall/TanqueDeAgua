  <circle cx="300" cy="428" r="3" fill="#2C2C2A"/>
  <circle cx="300" cy="574" r="3.5" fill="#2C2C2A"/>

  <path d="M250,430 L420,430 L420,518 L640,518" fill="none" stroke="#185FA5" stroke-width="2"/>

  <path d="M640,546 L560,546" fill="none" stroke="#639922" stroke-width="2"/>
  <rect x="505" y="538" width="55" height="16" rx="3" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text x="532" y="550" font-size="9.5" font-weight="700" fill="#854F0B" text-anchor="middle">R1 100Ω</text>
  <path d="M505,546 L470,546" fill="none" stroke="#639922" stroke-width="2"/>
  <circle cx="470" cy="546" r="3.5" fill="#639922"/>
  <path d="M470,546 L470,468 L250,468" fill="none" stroke="#639922" stroke-width="2"/>
  <path d="M470,546 L470,600" fill="none" stroke="#639922" stroke-width="2"/>
