<svg viewBox="0 0 980 770" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title>Conexiones del nodo tanque (maestro), GND del nRF24 corregido</title>
  <rect x="0" y="0" width="980" height="770" fill="#ffffff"/>
  <text x="30" y="34" font-size="22" font-weight="700" fill="#2C2C2A">Nodo Tanque (maestro) — conexiones</text>
  <text x="30" y="56" font-size="13" fill="#5F5E5A">ESP32 · nRF24L01 (via AMS1117) · JSN-SR04T (ECHO con divisor 100Ω / 180Ω)</text>

