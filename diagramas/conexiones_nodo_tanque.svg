  <rect x="60" y="110" width="190" height="34" rx="10" fill="#D4537E"/>
  <text x="155" y="133" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">ESP32</text>
  <text x="155" y="566" font-size="11" fill="#5F5E5A" text-anchor="middle">(USB = alimentación)</text>
  <g font-size="12" fill="#2C2C2A" text-anchor="end">
