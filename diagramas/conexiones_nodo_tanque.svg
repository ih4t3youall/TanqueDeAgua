  <text x="560" y="680" font-size="11" font-weight="700" fill="#639922">ECHO</text>
  <line x1="595" y1="676" x2="630" y2="676" stroke="#639922" stroke-width="2"/>
  <rect x="630" y="668" width="46" height="16" rx="3" fill="#fff" stroke="#854F0B" stroke-width="1.5"/>
  <text x="653" y="680" font-size="9.5" font-weight="700" fill="#854F0B" text-anchor="middle">100Ω</text>
  <line x1="676" y1="676" x2="715" y2="676" stroke="#639922" stroke-width="2"/>
  <circle cx="715" cy="676" r="4" fill="#639922"/>
  <text x="715" y="664" font-size="10" font-weight="700" fill="#185FA5" text-anchor="middle">a G25</text>
  <line x1="715" y1="676" x2="715" y2="702" stroke="#639922" stroke-width="2"/>
  <rect x="692" y="702" width="46" height="16" rx="3" fill="#fff" stroke="#854F0B" stroke-width="1.5"/>
  <text x="715" y="714" font-size="9.5" font-weight="700" fill="#854F0B" text-anchor="middle">180Ω</text>
  <line x1="715" y1="718" x2="715" y2="734" stroke="#2C2C2A" stroke-width="2"/>
  <text x="715" y="746" font-size="10" font-weight="700" fill="#2C2C2A" text-anchor="middle">GND</text>
