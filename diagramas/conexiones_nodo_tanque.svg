    <line x1="236" y1="206" x2="250" y2="206" stroke="#1D9E75" stroke-width="2"/><text x="230" y="210">G19 · MISO</text>
    <line x1="236" y1="240" x2="250" y2="240" stroke="#D4537E" stroke-width="2"/><text x="230" y="244">G23 · MOSI</text>
    <line x1="236" y1="274" x2="250" y2="274" stroke="#97C459" stroke-width="2"/><text x="230" y="278">G4 · CE</text>
    <line x1="236" y1="308" x2="250" y2="308" stroke="#378ADD" stroke-width="2"/><text x="230" y="312">G5 · CSN</text>
    <line x1="236" y1="350" x2="250" y2="350" stroke="#E24B4A" stroke-width="3"/><text x="230" y="354" font-weight="700" fill="#E24B4A">5V (VIN)</text>
    <line x1="236" y1="388" x2="250" y2="388" stroke="#2C2C2A" stroke-width="3"/><text x="230" y="392" font-weight="700">GND</text>
    <line x1="236" y1="430" x2="250" y2="430" stroke="#185FA5" stroke-width="2"/><text x="230" y="434">G26 · TRIG</text>
    <line x1="236" y1="468" x2="250" y2="468" stroke="#639922" stroke-width="2"/><text x="230" y="472">G25 · ECHO</text>
  </g>

  <rect x="640" y="110" width="200" height="252" rx="10" fill="#fff" stroke="#888780" stroke-width="2"/>
  <rect x="640" y="110" width="200" height="30" rx="10" fill="#7F77DD"/>
  <text x="740" y="131" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">nRF24L01 (radio)</text>
  <g font-size="12" fill="#2C2C2A">
    <line x1="640" y1="160" x2="626" y2="160" stroke="#97C459" stroke-width="2"/><text x="650" y="164">CE</text>
    <line x1="640" y1="184" x2="626" y2="184" stroke="#378ADD" stroke-width="2"/><text x="650" y="188">CSN</text>
    <line x1="640" y1="208" x2="626" y2="208" stroke="#7F77DD" stroke-width="2"/><text x="650" y="212">SCK</text>
    <line x1="640" y1="232" x2="626" y2="232" stroke="#D4537E" stroke-width="2"/><text x="650" y="236">MOSI</text>
    <line x1="640" y1="256" x2="626" y2="256" stroke="#1D9E75" stroke-width="2"/><text x="650" y="260">MISO</text>
    <line x1="640" y1="280" x2="626" y2="280" stroke="#EF9F27" stroke-width="3"/><text x="650" y="283" font-size="11" font-weight="700" fill="#BA7517">VCC 3.3V</text>
    <line x1="640" y1="306" x2="626" y2="306" stroke="#2C2C2A" stroke-width="3"/><text x="650" y="310" font-weight="700">GND ← al común</text>
    <line x1="640" y1="332" x2="626" y2="332" stroke="#B4B2A9" stroke-width="2" stroke-dasharray="3 3"/><text x="650" y="336" fill="#888780">IRQ (libre, NO se conecta)</text>
  </g>

  <rect x="400" y="378" width="130" height="60" rx="8" fill="#fff" stroke="#EF9F27" stroke-width="2"/>
  <text x="465" y="400" font-size="12.5" font-weight="700" fill="#2C2C2A" text-anchor="middle">AMS1117</text>
  <text x="465" y="415" font-size="10" fill="#5F5E5A" text-anchor="middle">5V → 3.3V</text>
  <text x="408" y="432" font-size="9.5" fill="#E24B4A">IN</text>
  <text x="522" y="394" font-size="9.5" fill="#BA7517" text-anchor="end">OUT</text>

  <rect x="640" y="440" width="200" height="150" rx="10" fill="#fff" stroke="#888780" stroke-width="2"/>
  <rect x="640" y="440" width="200" height="30" rx="10" fill="#1D9E75"/>
  <text x="740" y="461" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">JSN-SR04T (5V)</text>
  <g font-size="12" fill="#2C2C2A">
    <line x1="640" y1="490" x2="626" y2="490" stroke="#E24B4A" stroke-width="3"/><text x="650" y="494" font-weight="700" fill="#E24B4A">VCC 5V</text>
    <line x1="640" y1="518" x2="626" y2="518" stroke="#185FA5" stroke-width="2"/><text x="650" y="522">TRIG</text>
