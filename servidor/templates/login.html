<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tanque de agua — Ingresar</title>
<style>
  :root {
    --bg: #0f172a; --card: #1e293b; --border: #334155;
    --text: #e2e8f0; --muted: #94a3b8; --accent: #38bdf8; --error: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 32px; width: 100%; max-width: 360px;
  }
  .logo { font-size: 40px; text-align: center; margin-bottom: 8px; }
  h1 { font-size: 20px; text-align: center; margin-bottom: 24px; font-weight: 600; }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  input {
    width: 100%; padding: 12px; margin-bottom: 16px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-size: 16px;
  }
  input:focus { outline: none; border-color: var(--accent); }
  button {
    width: 100%; padding: 13px; border: none; border-radius: 10px;
    background: var(--accent); color: #082f49; font-size: 16px; font-weight: 700;
    cursor: pointer;
  }
  button:active { opacity: .85; }
  .error {
    background: rgba(248,113,113,.12); border: 1px solid var(--error);
    color: var(--error); border-radius: 10px; padding: 10px;
    font-size: 14px; text-align: center; margin-bottom: 16px;
  }
</style>
</head>
<body>
  <form class="card" method="POST" action="/login">
    <div class="logo">💧</div>
    <h1>Tanque de agua</h1>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <label for="usuario">Usuario</label>
    <input id="usuario" name="usuario" type="text" autocomplete="username" required autofocus>
    <label for="password">Contraseña</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>
    <button type="submit">Ingresar</button>
  </form>
</body>
</html>
